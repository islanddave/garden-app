name: Build and Deploy — SPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate env vars
        run: |
          for VAR in VITE_CLERK_PUBLISHABLE_KEY VITE_API_PROJECTS VITE_API_PLANTS VITE_API_LOCATIONS VITE_API_EVENTS VITE_API_FAVORITES VITE_API_PHOTOS VITE_API_DASHBOARD; do
            [[ -n "${!VAR}" ]] || { echo "ERROR: $VAR not set"; exit 1; }
          done
          echo "All VITE_ vars present"
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_PROJECTS:          ${{ vars.VITE_API_PROJECTS }}
          VITE_API_PLANTS:            ${{ vars.VITE_API_PLANTS }}
          VITE_API_LOCATIONS:         ${{ vars.VITE_API_LOCATIONS }}
          VITE_API_EVENTS:            ${{ vars.VITE_API_EVENTS }}
          VITE_API_FAVORITES:         ${{ vars.VITE_API_FAVORITES }}
          VITE_API_PHOTOS:            ${{ vars.VITE_API_PHOTOS }}
          VITE_API_DASHBOARD:         ${{ vars.VITE_API_DASHBOARD }}

      - name: Build
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_PROJECTS:          ${{ vars.VITE_API_PROJECTS }}
          VITE_API_PLANTS:            ${{ vars.VITE_API_PLANTS }}
          VITE_API_LOCATIONS:         ${{ vars.VITE_API_LOCATIONS }}
          VITE_API_EVENTS:            ${{ vars.VITE_API_EVENTS }}
          VITE_API_FAVORITES:         ${{ vars.VITE_API_FAVORITES }}
          VITE_API_PHOTOS:            ${{ vars.VITE_API_PHOTOS }}
          VITE_API_DASHBOARD:         ${{ vars.VITE_API_DASHBOARD }}

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo 'ERROR: dist/index.html missing'; exit 1; }

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ vars.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
