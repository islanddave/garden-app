name: Build and Deploy — SPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate env vars
        run: |
          for VAR in VITE_CLERK_PUBLISHABLE_KEY VITE_API_PROJECTS VITE_API_PLANTS VITE_API_LOCATIONS VITE_API_EVENTS VITE_API_FAVORITES VITE_API_PHOTOS VITE_API_DASHBOARD; do
            [[ -n "${!VAR}" ]] || { echo "ERROR: $VAR not set"; exit 1; }
          done
          [[ "$VITE_CLERK_PUBLISHABLE_KEY" == pk_live_* ]] || {
            echo "ERROR: VITE_CLERK_PUBLISHABLE_KEY must be pk_live_* for prod (got ${VITE_CLERK_PUBLISHABLE_KEY:0:12}...)"
            exit 1
          }
          echo "All VITE_ vars present and valid"
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_PROJECTS:          ${{ vars.VITE_API_PROJECTS }}
          VITE_API_PLANTS:            ${{ vars.VITE_API_PLANTS }}
          VITE_API_LOCATIONS:         ${{ vars.VITE_API_LOCATIONS }}
          VITE_API_EVENTS:            ${{ vars.VITE_API_EVENTS }}
          VITE_API_FAVORITES:         ${{ vars.VITE_API_FAVORITES }}
          VITE_API_PHOTOS:            ${{ vars.VITE_API_PHOTOS }}
          VITE_API_DASHBOARD:         ${{ vars.VITE_API_DASHBOARD }}

      - name: Build
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_PROJECTS:          ${{ vars.VITE_API_PROJECTS }}
          VITE_API_PLANTS:            ${{ vars.VITE_API_PLANTS }}
          VITE_API_LOCATIONS:         ${{ vars.VITE_API_LOCATIONS }}
          VITE_API_EVENTS:            ${{ vars.VITE_API_EVENTS }}
          VITE_API_FAVORITES:         ${{ vars.VITE_API_FAVORITES }}
          VITE_API_PHOTOS:            ${{ vars.VITE_API_PHOTOS }}
          VITE_API_DASHBOARD:         ${{ vars.VITE_API_DASHBOARD }}

      - name: Verify build output
        run: test -f dist/index.html || { echo 'ERROR: dist/index.html missing'; exit 1; }

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3 — hashed assets (immutable)
        run: |
          aws s3 sync dist/assets/ s3://${{ vars.S3_BUCKET_NAME }}/assets/ \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata-directive REPLACE

      - name: Deploy to S3 — root files (no-cache, prune stale)
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --exclude "assets/*" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE \
            --delete

      - name: Invalidate CloudFront — index.html only
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} \
            --paths "/index.html"

      - name: Restore Lambda Function URL CORS
        # OPTIONS excluded from AllowMethods (>6 chars fails validation); AWS handles preflight automatically.
        run: |
          CORS='{"AllowCredentials":false,"AllowHeaders":["authorization","content-type"],"AllowMethods":["GET","POST","PUT","DELETE"],"AllowOrigins":["https://garden.futureishere.net"],"ExposeHeaders":[],"MaxAge":300}'
          for fn in garden-dashboard garden-events garden-favorites garden-locations garden-photos garden-plants garden-projects; do
            echo -n "CORS $fn: "
            aws lambda update-function-url-config \
              --function-name "$fn" \
              --region us-east-1 \
              --cors "$CORS" \
              --query 'Cors.AllowOrigins[0]' --output text
          done
