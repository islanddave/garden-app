name: Fix CloudFront SPA Routing (one-shot)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set CloudFront custom error responses (SPA routing)
        run: |
          DIST_ID="${{ vars.CLOUDFRONT_DIST_ID }}"

          # Get current config + ETag
          aws cloudfront get-distribution-config --id "$DIST_ID" > /tmp/dist-full.json
          ETAG=$(jq -r '.ETag' /tmp/dist-full.json)
          jq '.DistributionConfig' /tmp/dist-full.json > /tmp/dist-config.json

          # Inject custom error responses for SPA (403 + 404 → index.html 200)
          jq '.CustomErrorResponses = {
            "Quantity": 2,
            "Items": [
              {
                "ErrorCode": 403,
                "ResponsePagePath": "/index.html",
                "ResponseCode": "200",
                "ErrorCachingMinTTL": 0
              },
              {
                "ErrorCode": 404,
                "ResponsePagePath": "/index.html",
                "ResponseCode": "200",
                "ErrorCachingMinTTL": 0
              }
            ]
          }' /tmp/dist-config.json > /tmp/dist-config-updated.json

          # Apply update
          aws cloudfront update-distribution \
            --id "$DIST_ID" \
            --distribution-config file:///tmp/dist-config-updated.json \
            --if-match "$ETAG" \
            | jq '{Status: .Distribution.Status, DomainName: .Distribution.DomainName}'

          echo "Done — CloudFront will propagate in ~1-2 min"
