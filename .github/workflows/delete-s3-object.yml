name: Delete S3 Photo Object
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Delete object
        run: |
          aws s3 rm s3://garden-photos-prod/standalone/391cc553-092b-4a47-b297-7fa92525aa85.png
          echo "Done"
