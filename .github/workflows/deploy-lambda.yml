name: Deploy Lambda Functions

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: lambda-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        function: [projects, plants, locations, events, favorites, photos, dashboard]
      max-parallel: 4

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.19.0'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build and zip ${{ matrix.function }}
        run: |
          cd lambdas/${{ matrix.function }}
          npm install --omit=dev
          zip -r ../${{ matrix.function }}.zip .

      - name: Deploy or create ${{ matrix.function }}
        run: |
          FUNCTION_NAME="garden-${{ matrix.function }}"
          ZIP_FILE="fileb://lambdas/${{ matrix.function }}.zip"

          if aws lambda get-function --function-name "$FUNCTION_NAME" 2>/dev/null; then
            echo "Updating existing function: $FUNCTION_NAME"
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file "$ZIP_FILE"
          else
            echo "Creating new function: $FUNCTION_NAME"
            aws lambda create-function \
              --function-name "$FUNCTION_NAME" \
              --runtime nodejs20.x \
              --handler index.handler \
              --role ${{ vars.LAMBDA_EXECUTION_ROLE_ARN }} \
              --zip-file "$ZIP_FILE" \
              --timeout 30 \
              --memory-size 256
          fi

      - name: Wait for ${{ matrix.function }} update to complete
        run: |
          aws lambda wait function-updated \
            --function-name "garden-${{ matrix.function }}"
          echo "garden-${{ matrix.function }} is active"

# Env vars (DATABASE_URL, CLERK_SECRET_KEY) are managed via AWS Console / CloudShell.
# update-function-code does not reset env vars, so they persist across deployments.
# Re-apply via CloudShell if a function is recreated from scratch.

