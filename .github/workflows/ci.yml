name: CI — Build and Unit Tests

# Gate on PRs targeting any protected branch.
# Must pass before merge to dev, staging, or main is permitted.
# `push: [dev]` trigger removed 2026-05-01 (pipeline hardening sprint Step 1)
# to avoid double-firing once enhanced branch protection lands on main/staging.

on:
  pull_request:
    branches: [dev, staging, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (CI — placeholder env vars)
        # VITE_ vars are inlined at build time as string literals.
        # Placeholder values allow build to succeed without real infrastructure.
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          VITE_API_PROJECTS:          https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_PLANTS:            https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_LOCATIONS:         https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_EVENTS:            https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_FAVORITES:         https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_PHOTOS:            https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_DASHBOARD:         https://ci-placeholder.lambda-url.us-east-1.on.aws/

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo 'ERROR: dist/index.html missing'; exit 1; }

      - name: Coverage ratchet enforcement
        # Fails the build if vitest.config.ts thresholds fall below the
        # calendar-due target in coverage-ratchet.json.
        # B2 from pipeline-consolidation-plan-20260501.md (boss VP add).
        run: python3 scripts/check-coverage-ratchet.py

      - name: Run unit tests with coverage
        run: npm test
        # vitest exits non-zero if coverage thresholds (in vitest.config.ts) not met.
        # Path A baseline: thresholds at 0%; schedule ratchets up per coverage-ratchet.json.
