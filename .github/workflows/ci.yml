name: CI — Build and Unit Tests

# Gate on every dev push and on PRs targeting any protected branch.
# Must pass before merge to staging or main is permitted.

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, staging, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (CI — placeholder env vars)
        # VITE_ vars are inlined at build time as string literals.
        # Placeholder values allow build to succeed without real infrastructure.
        # Any missing VITE_ var that causes a runtime import.meta.env reference to fail
        # will surface here as a build error, not a silent runtime bug.
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          VITE_API_PROJECTS:          https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_PLANTS:            https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_LOCATIONS:         https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_EVENTS:            https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_FAVORITES:         https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_PHOTOS:            https://ci-placeholder.lambda-url.us-east-1.on.aws/
          VITE_API_DASHBOARD:         https://ci-placeholder.lambda-url.us-east-1.on.aws/

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo 'ERROR: dist/index.html missing'; exit 1; }

      - name: Run unit tests with coverage
        run: npm test
        # vitest exits non-zero if coverage thresholds not met.
        # Thresholds defined in vitest.config.ts (60% lines/functions/branches for components,
        # 70% for lib/ and hooks/).
