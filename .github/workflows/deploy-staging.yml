name: Build and Deploy — Staging + Regression Suite

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  # Staging Clerk (dev instance — publishable key is intentionally client-visible)
  STAGING_CLERK_KEY: pk_test_ZWxlY3RyaWMtaGF3ay04Ny5jbGVyay5hY2NvdW50cy5kZXYk
  # Staging Lambda URLs
  STAGING_API_PROJECTS:  https://mjozckiuondhvmsa7eulvuld3m0rptdh.lambda-url.us-east-1.on.aws/
  STAGING_API_PLANTS:    https://fhgmxvrp2mefmzybhhwiptb2j40abfrw.lambda-url.us-east-1.on.aws/
  STAGING_API_LOCATIONS: https://7d7gjas5nuup6dowlq7fxlwh6a0cotgd.lambda-url.us-east-1.on.aws/
  STAGING_API_EVENTS:    https://ugggquxg5qk5rkupwib3s53hty0vqdjf.lambda-url.us-east-1.on.aws/
  STAGING_API_FAVORITES: https://groahbarqmnhamc2oicymsuuba0rugkj.lambda-url.us-east-1.on.aws/
  STAGING_API_PHOTOS:    https://sj6y3awedsfxqttuascvateeoy0tohji.lambda-url.us-east-1.on.aws/
  STAGING_API_DASHBOARD: https://rsooajzuwmmyldgrpx7ebp2doa0gttpn.lambda-url.us-east-1.on.aws/
  # Staging infra
  STAGING_S3_BUCKET:   garden-app-staging
  STAGING_CF_DIST_ID:  E3K5KH9B8CTPQS
  STAGING_CF_ORIGIN:   https://dg6mmjhepoyt9.cloudfront.net

jobs:
  # ── Deploy staging Lambda functions ──────────────────────────────────────
  deploy-lambdas:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        function: [projects, plants, locations, events, favorites, photos, dashboard]
      max-parallel: 4
      fail-fast: false

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.19.0'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build and zip ${{ matrix.function }}
        run: |
          cd lambda/${{ matrix.function }}
          npm install --omit=dev
          zip -r ../${{ matrix.function }}.zip .

      - name: Deploy ${{ matrix.function }}-staging
        run: |
          aws lambda update-function-code \
            --function-name "garden-${{ matrix.function }}-staging" \
            --zip-file "fileb://lambda/${{ matrix.function }}.zip"

      - name: Wait for ${{ matrix.function }}-staging
        run: |
          aws lambda wait function-updated \
            --function-name "garden-${{ matrix.function }}-staging"
          echo "garden-${{ matrix.function }}-staging active"

      - name: Health check ${{ matrix.function }}-staging
        run: |
          FN="garden-${{ matrix.function }}-staging"
          STATE=$(aws lambda get-function-configuration \
            --function-name "$FN" \
            --query 'State' --output text)
          [[ "$STATE" == "Active" ]] || { echo "FATAL: $FN state=$STATE (expected Active)"; exit 1; }
          echo "✅ $FN is $STATE"

      - name: Restore staging Lambda CORS
        run: |
          CORS='{"AllowCredentials":false,"AllowHeaders":["authorization","content-type"],"AllowMethods":["GET","POST","PUT","DELETE"],"AllowOrigins":["${{ env.STAGING_CF_ORIGIN }}"],"ExposeHeaders":[],"MaxAge":300}'
          aws lambda update-function-url-config \
            --function-name "garden-${{ matrix.function }}-staging" \
            --region us-east-1 \
            --cors "$CORS" \
            --query 'Cors.AllowOrigins[0]' --output text

  # ── Build and deploy staging frontend ────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-24.04
    needs: deploy-lambdas
    outputs:
      artifact-hash:   ${{ steps.build.outputs.artifact-hash }}
      asset-filename:  ${{ steps.build.outputs.asset-filename }}
      commit-sha:      ${{ steps.build.outputs.commit-sha }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (staging)
        id: build
        run: |
          npm run build
          ARTIFACT_HASH=$(sha256sum dist/index.html | awk '{print $1}')
          ASSET_FILE=$(ls dist/assets/index-*.js 2>/dev/null | head -1 | xargs -r basename || echo "")
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "artifact-hash=$ARTIFACT_HASH"  >> "$GITHUB_OUTPUT"
          echo "asset-filename=$ASSET_FILE"    >> "$GITHUB_OUTPUT"
          echo "commit-sha=$COMMIT_SHA"        >> "$GITHUB_OUTPUT"
          echo "Build artifact hash : $ARTIFACT_HASH"
          echo "Hashed asset file   : $ASSET_FILE"
          echo "Commit SHA          : $COMMIT_SHA"
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ env.STAGING_CLERK_KEY }}
          VITE_API_PROJECTS:          ${{ env.STAGING_API_PROJECTS }}
          VITE_API_PLANTS:            ${{ env.STAGING_API_PLANTS }}
          VITE_API_LOCATIONS:         ${{ env.STAGING_API_LOCATIONS }}
          VITE_API_EVENTS:            ${{ env.STAGING_API_EVENTS }}
          VITE_API_FAVORITES:         ${{ env.STAGING_API_FAVORITES }}
          VITE_API_PHOTOS:            ${{ env.STAGING_API_PHOTOS }}
          VITE_API_DASHBOARD:         ${{ env.STAGING_API_DASHBOARD }}

      - name: Verify build output
        run: test -f dist/index.html || { echo 'ERROR: dist/index.html missing'; exit 1; }

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3 staging — hashed assets (immutable)
        run: |
          aws s3 sync dist/assets/ s3://${{ env.STAGING_S3_BUCKET }}/assets/ \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata-directive REPLACE

      - name: Deploy to S3 staging — root files (no-cache)
        run: |
          aws s3 sync dist/ s3://${{ env.STAGING_S3_BUCKET }}/ \
            --exclude "assets/*" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE \
            --delete

      - name: Invalidate staging CloudFront and wait for completion
        run: |
          INVAL_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.STAGING_CF_DIST_ID }} \
            --paths "/index.html" \
            --query 'Invalidation.Id' --output text)
          echo "Waiting for invalidation $INVAL_ID to complete (edge flush, not just accepted)..."
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ env.STAGING_CF_DIST_ID }} \
            --id "$INVAL_ID"
          echo "✅ CF invalidation $INVAL_ID complete"

      - name: Verify CF edge serving new build [Boss condition 1]
        # Confirms CF is serving the just-deployed build, not a stale cached version.
        # Strategy: Vite bakes content hash into asset filenames; grep the served
        # index.html for the known hashed filename. Mismatch = stale edge cache.
        run: |
          ASSET_FILE="${{ steps.build.outputs.asset-filename }}"
          if [[ -z "$ASSET_FILE" ]]; then
            echo "WARNING: No hashed asset filename captured from build — skipping content verify"
            echo "         (This may mean the Vite build config changed asset naming conventions)"
          else
            echo "Verifying CF edge serves index.html referencing $ASSET_FILE..."
            CF_HTML=$(curl -sf --max-time 30 --connect-timeout 10 \
              "${{ env.STAGING_CF_ORIGIN }}/index.html") || {
              echo "FATAL: Could not fetch ${{ env.STAGING_CF_ORIGIN }}/index.html"
              exit 1
            }
            if grep -q "$ASSET_FILE" <<< "$CF_HTML"; then
              echo "✅ CF serving fresh build (found $ASSET_FILE in index.html)"
            else
              echo "FATAL: CF serving stale build — $ASSET_FILE not found in served index.html"
              echo "First 300 chars of CF response:"
              echo "${CF_HTML:0:300}"
              exit 1
            fi
          fi

  # ── DB schema integrity check ─────────────────────────────────────────────
  # Runs AFTER frontend deploy so Lambda and DB changes are both live.
  # Uses isolated staging Neon branch — never touches prod DB.
  db-schema-check:
    runs-on: ubuntu-24.04
    needs: deploy-frontend
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Run schema integrity check
        run: bash tests/schema/check-schema.sh
        env:
          NEON_STAGING_URL: ${{ secrets.NEON_STAGING_URL }}

  # ── Smoke tests ───────────────────────────────────────────────────────────
  # Phase 1: Lambda reachability (no auth required — 4xx is fine, 5xx is not).
  # Phase 2: Authenticated CRUD (requires CLERK_SECRET_KEY_STAGING + CLERK_TEST_USER_ID secrets).
  smoke-tests:
    runs-on: ubuntu-24.04
    needs: db-schema-check
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run smoke tests
        run: bash tests/smoke/run-smoke.sh
        env:
          # Phase 1 (Lambda reachability) uses these — always set
          STAGING_API_PROJECTS:  ${{ env.STAGING_API_PROJECTS }}
          STAGING_API_PLANTS:    ${{ env.STAGING_API_PLANTS }}
          STAGING_API_LOCATIONS: ${{ env.STAGING_API_LOCATIONS }}
          STAGING_API_EVENTS:    ${{ env.STAGING_API_EVENTS }}
          STAGING_API_FAVORITES: ${{ env.STAGING_API_FAVORITES }}
          STAGING_API_PHOTOS:    ${{ env.STAGING_API_PHOTOS }}
          STAGING_API_DASHBOARD: ${{ env.STAGING_API_DASHBOARD }}
          COMMIT_SHA:            ${{ needs.deploy-frontend.outputs.commit-sha }}
          # Phase 2 (authenticated CRUD) — set these GHA secrets to enable:
          # CLERK_SECRET_KEY_STAGING = sk_test_... (Clerk dev instance secret key)
          # CLERK_TEST_USER_ID       = user_...    (existing user in dev Clerk instance)
          CLERK_SECRET_KEY_STAGING: ${{ secrets.CLERK_SECRET_KEY_STAGING }}
          CLERK_TEST_USER_ID:       ${{ secrets.CLERK_TEST_USER_ID }}

  # ── E2E advisory (non-blocking) ───────────────────────────────────────────
  # Playwright rejected as merge gate: 250MB browser binaries per cold runner,
  # trace triage requires human. This job is the future hook for optional nightly
  # browser tests. continue-on-error: true = never blocks the gate.
  e2e-advisory:
    runs-on: ubuntu-24.04
    needs: smoke-tests
    continue-on-error: true

    steps:
      - name: Advisory placeholder
        run: |
          echo "E2E advisory layer — no browser tests in current gate config"
          echo "Smoke tests green for commit: ${{ needs.deploy-frontend.outputs.commit-sha || github.sha }}"
          echo "Staging regression suite: PASSED ✅"
          echo "To add Playwright: create tests/e2e/ and invoke from this job with continue-on-error: true"
