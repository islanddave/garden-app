name: Daily Database Backup

on:
  schedule:
    # 3am ET = 7am UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client-17
        # Neon runs PostgreSQL 17. pg_dump must be >= server version.
        # Ubuntu runners don't ship pg17 — add the official PGDG apt repo first.
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch Neon connection string from Secrets Manager
        run: |
          NEON_URL=$(aws secretsmanager get-secret-value \
            --secret-id garden-app/neon-database-url \
            --query SecretString --output text)
          echo "NEON_DATABASE_URL=$NEON_URL" >> "$GITHUB_ENV"
          echo "Neon connection string retrieved"

      - name: pg_dump from Neon
        # Neon runs PostgreSQL 17 on us-east-1.
        # Use full pg17 path — system pg_dump in PATH may be pg16 (runner default).
        # pg_dump version must be >= server version or it aborts.
        # --no-owner and --no-privileges: avoid role-specific ACLs that don't exist on restore targets.
        # --schema=public: exclude pg internals.
        # -Fc: custom format; supports selective restore and compression.
        run: |
          DUMP_FILE="/tmp/garden-$(date +%Y%m%d).dump"
          /usr/lib/postgresql/17/bin/pg_dump \
            "$NEON_DATABASE_URL" \
            --schema=public \
            --no-owner \
            --no-privileges \
            -Fc \
            -f "$DUMP_FILE"
          echo "DUMP_FILE=$DUMP_FILE" >> "$GITHUB_ENV"
          echo "Dump file size: $(du -sh $DUMP_FILE | cut -f1)"

      - name: Upload to S3
        run: |
          S3_KEY="db/garden-$(date +%Y%m%d).dump"
          aws s3 cp "$DUMP_FILE" "s3://${{ vars.BACKUP_BUCKET_NAME }}/$S3_KEY"

      - name: Verify upload
        run: |
          S3_KEY="db/garden-$(date +%Y%m%d).dump"
          RESULT=$(aws s3 ls "s3://${{ vars.BACKUP_BUCKET_NAME }}/$S3_KEY" 2>&1)
          if [ $? -ne 0 ] || [ -z "$RESULT" ]; then
            echo "ERROR: Upload verification failed — object not found in S3"
            echo "aws s3 ls output: $RESULT"
            exit 1
          fi
          echo "Upload verified: $RESULT"

      - name: Cleanup local dump
        if: always()
        run: rm -f /tmp/garden-*.dump

# S3 lifecycle rules must be configured on the backup bucket:
#   - Retain last 14 daily dumps
#   - Retain last 4 weekly dumps
#   - Expire older objects automatically
#
# IAM: garden-app-github-deploy role has secretsmanager:GetSecretValue on
# arn:aws:secretsmanager:us-east-1:769788341849:secret:garden-app/neon-database-url-CfCmYc
# (policy: garden-backup-secrets-read, added 2026-04-30)
