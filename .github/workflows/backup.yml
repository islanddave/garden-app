name: Daily Database Backup

on:
  schedule:
    # 3am ET = 7am UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client-17
        # pg17 required: Supabase server runs PostgreSQL 17.6; pg_dump must be >= server version.
        # Ubuntu runners don't ship pg17 — add the official PGDG apt repo first.
        # If Supabase upgrades past 17, update the version in both the repo add and install lines.
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          # Separate backup role — only needs s3:PutObject on backup bucket
          role-to-assume: ${{ vars.AWS_BACKUP_ROLE_ARN }}
          aws-region: us-east-1

      - name: pg_dump from Supabase
        # Use Supabase session pooler (aws-1-us-west-2.pooler.supabase.com:5432).
        # Direct connection (db.xxx.supabase.co) resolves only to IPv6; GitHub Actions
        # runners cannot reach it. Session pooler has IPv4 and is pg_dump-compatible
        # (session mode maintains a persistent connection, unlike transaction pooler).
        # Username for session pooler is postgres.{project-ref}, NOT postgres.
        # --no-owner and --no-privileges required: Supabase roles don't exist on Neon.
        # --schema=public required: exclude Supabase internal schemas (auth, storage, etc.)
        # -Fc = custom format; supports selective restore and compression.
        run: |
          DUMP_FILE="/tmp/garden-$(date +%Y%m%d).dump"
          PGPASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }} pg_dump \
            --host=${{ vars.SUPABASE_DB_HOST }} \
            --port=5432 \
            --username=${{ vars.SUPABASE_DB_USER }} \
            --schema=public \
            --no-owner \
            --no-privileges \
            -Fc \
            postgres > "$DUMP_FILE"
          echo "DUMP_FILE=$DUMP_FILE" >> "$GITHUB_ENV"
          echo "Dump file size: $(du -sh $DUMP_FILE | cut -f1)"

      - name: Upload to S3
        run: |
          DUMP_FILE="/tmp/garden-$(date +%Y%m%d).dump"
          S3_KEY="db/garden-$(date +%Y%m%d).dump"
          aws s3 cp "$DUMP_FILE" "s3://${{ vars.BACKUP_BUCKET_NAME }}/$S3_KEY"

      - name: Verify upload
        run: |
          S3_KEY="db/garden-$(date +%Y%m%d).dump"
          # Confirm the object exists in S3 and has non-zero size
          RESULT=$(aws s3 ls "s3://${{ vars.BACKUP_BUCKET_NAME }}/$S3_KEY" 2>&1)
          if [ $? -ne 0 ] || [ -z "$RESULT" ]; then
            echo "ERROR: Upload verification failed — object not found in S3"
            echo "aws s3 ls output: $RESULT"
            exit 1
          fi
          echo "Upload verified: $RESULT"

      - name: Cleanup local dump
        if: always()
        run: rm -f /tmp/garden-*.dump

# S3 lifecycle rules must be configured on the backup bucket (infrastructure step, not here):
#   - Retain last 14 daily dumps
#   - Retain last 4 weekly dumps (tag Sunday backups or use prefix-based lifecycle)
#   - Expire older objects automatically
# Do NOT rely on GitHub Actions artifacts for backup retention — 90-day expiry silently
# deletes backups and artifacts are not accessible via AWS tooling for restore workflows.
#
# Failure alerting: GitHub Actions will email repo notification subscribers on workflow
# failure if notifications are enabled for the repo. Enable at:
# repo Settings → Notifications → Actions → "Send notifications for failed workflows"
# For more robust alerting, add an SNS topic and publish from a failure step.
