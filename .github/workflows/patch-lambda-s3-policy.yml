name: Patch Lambda S3 Photo Access

# One-shot workflow — run once to grant the Lambda exec role s3:GetObject + s3:PutObject
# on the photos bucket. Safe to re-run (put-role-policy is idempotent).
# Delete this file after confirming photos load.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Attach inline S3 policy to Lambda exec role
        run: |
          aws iam put-role-policy \
            --role-name garden-app-lambda-exec \
            --policy-name garden-photos-s3-access \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "PhotosBucketAccess",
                  "Effect": "Allow",
                  "Action": [
                    "s3:GetObject",
                    "s3:PutObject",
                    "s3:DeleteObject"
                  ],
                  "Resource": "arn:aws:s3:::garden-photos-prod/*"
                },
                {
                  "Sid": "PhotosBucketList",
                  "Effect": "Allow",
                  "Action": "s3:ListBucket",
                  "Resource": "arn:aws:s3:::garden-photos-prod"
                }
              ]
            }'
          echo "Policy applied to garden-app-lambda-exec"

      - name: Verify policy attached
        run: |
          aws iam get-role-policy \
            --role-name garden-app-lambda-exec \
            --policy-name garden-photos-s3-access \
            | python3 -c "import json,sys; p=json.load(sys.stdin); print('✅ Policy verified:', p['PolicyName'])"
